  category: forms
  description: Signature pad for drawing signatures.
  props:
  - name: name
    type: String
    default: nil
    required: false
  - name: value
    type: String
    default: nil
    required: false
  - name: placeholder
    type: String
    default: nil
    required: false
  - name: disabled
    type: Boolean
    default: 'false'
    required: false
  - name: size
    type: Symbol
    default: ":md"
    required: false
    values:
    - sm
    - md
    - lg
  examples:
  - label: Default
    props:
      placeholder: Enter value...
  - label: Disabled
    props:
      placeholder: Disabled
      disabled: true
